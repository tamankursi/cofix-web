<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cofix - Login Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">COFIX</a>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/products.html">Products</a></li>
            </ul>
        </nav>
    </header>

    <section style="max-width:400px; margin:80px auto; padding:0 20px;">
        <h2 style="color:#3E2723; text-align:center; margin-bottom:24px;">Login Admin</h2>
        <form id="login-form" style="display:flex; flex-direction:column; gap:16px;">
            <div>
                <label for="email" style="display:block; margin-bottom:4px; color:#3E2723;">Email</label>
                <input type="email" id="email" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
            </div>
            <div>
                <label for="password" style="display:block; margin-bottom:4px; color:#3E2723;">Password</label>
                <input type="password" id="password" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
            </div>
            <button type="submit" style="padding:12px; background-color:#FF8F00; color:#3E2723; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Login</button>
        </form>
        <p id="login-error" style="color:#D32F2F; text-align:center; margin-top:12px;"></p>
    </section>

    <footer>
        <p>&copy; 2024 Cofix. Semua hak dilindungi.</p>
    </footer>

    <script type="module">
        import { supabase } from "./scripts/supabase.js";

        document.getElementById("login-form").addEventListener("submit", async function(event) {
            event.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errorEl = document.getElementById("login-error");

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorEl.textContent = "Login gagal: " + error.message;
                return;
            }

            if (data.session) {
                window.location.href = "/admin.html";
            }
        });
    </script>
</body>
</html>
