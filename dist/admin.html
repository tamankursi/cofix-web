<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cofix - Dashboard Admin</title>
    <link rel="stylesheet" href="/styles/main.css">
  <script type="module" crossorigin src="/assets/admin-Dcn-IGqv.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/supabase-DzmAdRKq.js">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">COFIX</a>
            <ul>
                <li><a href="/admin.html">Dashboard</a></li>
                <li><a href="#" id="logout-btn">Logout</a></li>
            </ul>
        </nav>
    </header>

    <section style="max-width:1100px; margin:40px auto; padding:0 20px;">
        <h2 style="color:#3E2723; margin-bottom:8px;">Dashboard Admin</h2>
        <p style="color:#888; margin-bottom:24px;">Kelola pesanan dan menu Cofix</p>

        <h3 style="color:#3E2723; margin-bottom:16px;">Daftar Pesanan</h3>
        <div id="orders-list" style="margin-bottom:40px;">
            <p style="color:#888;">Memuat pesanan...</p>
        </div>

                <h3 style="color:#3E2723; margin-bottom:16px;">Kelola Menu</h3>
        <button id="btn-tambah-menu" style="padding:8px 16px; background-color:#FF8F00; color:#3E2723; border:none; border-radius:4px; font-weight:bold; cursor:pointer; margin-bottom:16px;">+ Tambah Menu Baru</button>
        <div id="menu-list-admin">
            <p style="color:#888;">Memuat menu...</p>
        </div>

        <div id="form-menu" style="display:none; background:#EFEBE9; padding:20px; border-radius:8px; margin-top:16px;">
            <h4 id="form-title" style="color:#3E2723; margin-bottom:16px;">Tambah Menu</h4>
            <input type="hidden" id="edit-id">
            <div style="display:flex; flex-direction:column; gap:12px;">
                <div>
                    <label for="menu-name" style="display:block; margin-bottom:4px; color:#3E2723;">Nama Menu</label>
                    <input type="text" id="menu-name" required style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                </div>
                <div>
                    <label for="menu-price" style="display:block; margin-bottom:4px; color:#3E2723;">Harga (Rp)</label>
                    <input type="number" id="menu-price" required style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                </div>
                <div>
                    <label for="menu-stock" style="display:block; margin-bottom:4px; color:#3E2723;">Stok</label>
                    <input type="number" id="menu-stock" required style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                </div>
                <div style="display:flex; gap:8px;">
                    <button id="btn-simpan-menu" style="padding:10px 20px; background-color:#4CAF50; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">Simpan</button>
                    <button id="btn-batal-menu" style="padding:10px 20px; background-color:#BDBDBD; color:#333; border:none; border-radius:4px; cursor:pointer;">Batal</button>
                </div>
            </div>
        </div>

    </section>

    <footer>
        <p>&copy; 2024 Cofix. Semua hak dilindungi.</p>
    </footer>

</body>
</html>
