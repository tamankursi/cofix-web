<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cofix - Checkout</title>
    <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">COFIX</a>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/products.html">Products</a></li>
                <li><a href="/cerita-kami.html">Cerita Kami</a></li>
                <li><a href="/contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="checkout-section" style="max-width:1100px; margin:60px auto; padding:0 20px;">
        <h2 style="color:#3E2723; margin-bottom:24px; text-align:center;">Checkout</h2>

        <div style="display:flex; gap:40px; flex-wrap:wrap;">
            <!-- Kolom kiri: Form -->
            <div style="flex:1; min-width:300px;">
                <h3 style="color:#3E2723; margin-bottom:16px;">Data Pemesan</h3>

                <form id="checkout-form" style="display:flex; flex-direction:column; gap:16px;">
                    <div>
                        <label for="name" style="display:block; margin-bottom:4px; color:#3E2723;">Nama</label>
                        <input type="text" id="name" name="name" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
                    </div>

                    <div>
                        <label for="phone" style="display:block; margin-bottom:4px; color:#3E2723;">Nomor HP</label>
                        <input type="tel" id="phone" name="phone" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
                    </div>

                    <div>
                        <label for="method" style="display:block; margin-bottom:4px; color:#3E2723;">Metode Pengiriman</label>
                        <select id="method" name="method" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
                            <option value="">-- Pilih --</option>
                            <option value="pickup">Pick Up (Ambil di Kedai)</option>
                            <option value="delivery">Delivery (Antar ke Alamat)</option>
                        </select>
                    </div>

                    <div id="address-field" style="display:none;">
                        <label for="address" style="display:block; margin-bottom:4px; color:#3E2723;">Alamat</label>
                        <textarea id="address" name="address" rows="3" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;"></textarea>
                    </div>
                </form>
            </div>

            <!-- Kolom kanan: Ringkasan pesanan -->
            <div style="flex:1; min-width:300px;">
                <h3 style="color:#3E2723; margin-bottom:16px;">Ringkasan Pesanan</h3>
                <div id="checkout-items"></div>
                <div id="checkout-total" style="font-weight:bold; font-size:18px; color:#3E2723; margin-top:16px;"></div>
                <button type="submit" form="checkout-form" id="pay-button" onclick="submitOrder(event)" style="width:100%; margin-top:24px; padding:14px; background-color:#FF8F00; color:#3E2723; border:none; border-radius:4px; font-weight:bold; font-size:16px; cursor:pointer;">
                    Bayar Sekarang
                </button>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Cofix. Semua hak dilindungi.</p>
    </footer>

    <script type="module" src="scripts/menu.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        renderCheckout();

        const methodSelect = document.getElementById("method");
        const addressField = document.getElementById("address-field");

        methodSelect.addEventListener("change", function() {
            if (methodSelect.value === "delivery") {
                addressField.style.display = "block";
            } else {
                addressField.style.display = "none";
            }
        });
    });
</script>
</body>
</html>
